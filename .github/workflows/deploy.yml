name: Build and Deploy to Firebase

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secret-scanning:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main

  security-rules-test:
    runs-on: ubuntu-latest
    needs: secret-scanning

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase tools
        run: npm install -g firebase-tools

      - name: Install rules testing dependencies
        run: npm install @firebase/rules-unit-testing mocha

      - name: Validate Firestore rules
        run: firebase emulators:exec --only firestore "echo Security rules loaded successfully"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  analyze:
    runs-on: ubuntu-latest
    needs: security-rules-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  test:
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Activate coverage tools
        run: flutter pub global activate coverage

      - name: Generate LCOV report
        run: flutter pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --packages=.dart_tool/package_config.json --report-on=lib

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  coverage-report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Coverage report downloaded successfully
        run: echo "Coverage report downloaded successfully"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: lineskip-9ac91

  pipeline-status:
    runs-on: ubuntu-latest
    needs: [secret-scanning, security-rules-test, analyze, test, coverage-report, build, deploy]
    if: always()

    steps:
      - name: Pipeline summary
        run: |
          echo "=========================================="
          echo "           PIPELINE STATUS SUMMARY"
          echo "=========================================="
          echo "secret-scanning      : ${{ needs.secret-scanning.result }}"
          echo "security-rules-test  : ${{ needs.security-rules-test.result }}"
          echo "analyze              : ${{ needs.analyze.result }}"
          echo "test                 : ${{ needs.test.result }}"
          echo "coverage-report      : ${{ needs.coverage-report.result }}"
          echo "build                : ${{ needs.build.result }}"
          echo "deploy               : ${{ needs.deploy.result }}"
          echo "=========================================="
